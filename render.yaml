services:
  - type: web
    name: unilag-speed-enforcement
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    healthCheckPath: /api/v1/health
    numInstances: 1
    disk:
      name: storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/src/storage
      - key: APP_BASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: PYTHON_VERSION
        value: 3.11.9
